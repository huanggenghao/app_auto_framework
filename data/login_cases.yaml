cases:
  - case_id: "login_phone_success"
    title: "手机号密码登录成功并处理验证码和KYC"
    account_type: "au_normal_phone"
    auth_method: "password"
    use_prefilled_password: true
    verification_code: "123456"
    post_login:
      expected_landing: "kyc"
      kyc_action: "leave"
      timeout: 15
    expected:
      success: true
      success_text: "身份验证"

  - case_id: "login_email_password_success"
    title: "邮箱密码登录成功"
    account_type: "au_normal"
    auth_method: "password"
    use_prefilled_password: false
    verification_code: "123456"
    post_login:
      expected_landing: "home"
      timeout: 15
    expected:
      success: true
      success_text: "身份验证"

  - case_id: "login_email_code_success"
    title: "邮箱验证码登录成功"
    account_type: "au_normal"
    auth_method: "verification_code"
    verification_code: "123456"
    post_login:
      expected_landing: "home"
      timeout: 15
    expected:
      success: true
      success_text: "身份验证"
